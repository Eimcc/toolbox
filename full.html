<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多媒体格式转换器 - Windows XP风格</title>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <style>
        /* 全局样式 */
        body {
            font-family: "Microsoft Sans Serif", Arial, sans-serif;
            background-color: #008080;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 桌面背景 */
        .desktop {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-color: #008080;
        }

        /* 桌面背景Canvas */
        #desktopCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 桌面图标 */
        .desktop-icon {
            position: absolute;
            width: 64px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.2s ease;
            z-index: 1;
        }

        .desktop-icon:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .icon-image {
            width: 48px;
            height: 48px;
            background-color: #ffffff;
            border: 1px solid #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .icon-label {
            color: white;
            font-size: 12px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* 窗口样式 */
        .window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 550px;
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            font-size: 12px;
            z-index: 10;
            display: none;
        }

        .window.active {
            display: block;
        }

        /* 窗口标题栏 */
        .window-titlebar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .window-title {
            font-weight: bold;
        }

        .window-controls {
            display: flex;
            gap: 2px;
        }

        .control-button {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border: 1px inset #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
        }

        /* 窗口内容 */
        .window-content {
            padding: 16px;
            height: calc(100% - 40px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 标题样式 */
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #000080;
            text-align: center;
            margin-bottom: 4px;
        }

        /* 上传文件区域 */
        .upload-file-area {
            background-color: #ffffff;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 300px;
            position: relative;
            --before-opacity: 1;
        }

        .upload-file-area:hover {
            background-color: #f0f0f0;
        }

        .upload-icon {
            font-size: 48px;
            color: #808080;
            margin-bottom: 8px;
            transition: opacity 0.5s ease;
            z-index: 1;
            position: relative;
        }

        .upload-text {
            color: #808080;
            text-align: center;
            margin-bottom: 16px;
            transition: opacity 0.5s ease;
            z-index: 1;
            position: relative;
        }

        /* 文件列表 */
        .file-list {
            width: 100%;
            flex: 1;
            background-color: #ffffff;
            overflow-y: auto;
            margin-top: 16px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
        }

        .file-preview {
            width: 40px;
            height: 40px;
            object-fit: cover;
            margin-right: 12px;
            border: 1px solid #808080;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .file-status {
            font-size: 11px;
            color: #666;
        }

        .file-status.success {
            color: #008000;
        }

        .file-status.error {
            color: #ff0000;
        }

        .file-remove {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
        }

        .file-remove:hover {
            background-color: #cc0000;
        }

        /* 文件项进度条 */
        .file-progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border: 1px inset #ffffff;
            height: 8px;
            margin-top: 4px;
            display: none;
        }

        .file-progress-bar {
            height: 100%;
            background-color: #008000;
            width: 0%;
            transition: width 0.2s ease;
        }

        /* 格式选择区域 */
        .format-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .format-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .format-label {
            font-weight: bold;
        }

        .format-select {
            width: 120px;
            padding: 4px;
            border: 1px inset #ffffff;
            background-color: #ffffff;
            font-family: "Microsoft Sans Serif", Arial, sans-serif;
            font-size: 12px;
        }

        /* 箭头图标 */
        .arrow {
            font-size: 24px;
            color: #000080;
        }

        /* 按钮区域 */
        .button-area {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        /* 按钮样式 */
        .button {
            padding: 6px 16px;
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            font-family: "Microsoft Sans Serif", Arial, sans-serif;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .button:hover {
            background-color: #d0d0d0;
        }

        .button:active {
            border-style: inset;
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 状态信息 */
        .status {
            text-align: center;
            color: #000080;
            font-weight: bold;
            margin-top: -10px;
        }

        /* 进度条 */
        .progress-container {
            background-color: #ffffff;
            border: 1px inset #ffffff;
            height: 20px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background-color: #008000;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="desktop">
        <!-- 桌面背景Canvas -->
        <canvas id="desktopCanvas"></canvas>
        
        <!-- 桌面图标 -->
        <div class="desktop-icon" id="imageConverterIcon" style="top: 20px; left: 20px;">
            <div class="icon-image">🖼️</div>
            <div class="icon-label">图片格式转换器</div>
        </div>

        <div class="desktop-icon" id="videoConverterIcon" style="top: 120px; left: 20px;">
            <div class="icon-image">🎬</div>
            <div class="icon-label">视频格式转换器</div>
        </div>

        <div class="desktop-icon" id="audioConverterIcon" style="top: 220px; left: 20px;">
            <div class="icon-image">🎵</div>
            <div class="icon-label">音频格式转换器</div>
        </div>

        <!-- 图片转换器窗口 -->
        <div class="window" id="imageConverterWindow">
            <div class="window-titlebar">
                <div class="window-title">图片格式转换器 - 批量版</div>
                <div class="window-controls">
                    <div class="control-button" id="imageMinimizeButton">_</div>
                    <div class="control-button" id="imageMaximizeButton">□</div>
                    <div class="control-button" id="imageCloseButton">×</div>
                </div>
            </div>
            <div class="window-content">
                <div class="title">选择多张图片进行批量格式转换 (支持HEIC)</div>
                
                <div class="upload-file-area" id="imageUploadArea">
                    <input type="file" id="imageFileInput" accept="image/*,.heic" style="display: none;" multiple>
                    <div class="upload-icon" id="imageUploadIcon">📁</div>
                    <div class="upload-text" id="imageUploadText">点击或拖拽多张图片到此处<br>支持批量选择和批量转换<br>支持HEIC、JPG、PNG、WebP、GIF格式</div>
                    <div class="file-list" id="imageFileList"></div>
                </div>
                
                <div class="progress-container" id="imageProgressContainer">
                    <div class="progress-bar" id="imageProgressBar"></div>
                </div>
                
                <div class="format-section">
                    <div class="format-group">
                        <label class="format-label">目标格式</label>
                        <select id="imageTargetFormat" class="format-select">
                            <option value="jpg">JPG</option>
                            <option value="png">PNG</option>
                            <option value="webp">WebP</option>
                            <option value="gif">GIF</option>
                        </select>
                    </div>
                </div>
                
                <div class="button-area">
                    <button class="button" id="imageConvertButton" disabled>转换</button>
                    <button class="button" id="imageDownloadButton" disabled>下载</button>
                    <button class="button" id="imageResetButton">清空</button>
                </div>
                
                <div class="status" id="imageStatus">就绪</div>
            </div>
        </div>

        <!-- 视频转换器窗口 -->
        <div class="window" id="videoConverterWindow">
            <div class="window-titlebar">
                <div class="window-title">视频格式转换器 - 批量版</div>
                <div class="window-controls">
                    <div class="control-button" id="videoMinimizeButton">_</div>
                    <div class="control-button" id="videoMaximizeButton">□</div>
                    <div class="control-button" id="videoCloseButton">×</div>
                </div>
            </div>
            <div class="window-content">
                <div class="title">选择多个视频进行批量格式转换</div>
                
                <div class="upload-file-area" id="videoUploadArea">
                    <input type="file" id="videoFileInput" accept="video/*" style="display: none;" multiple>
                    <div class="upload-icon" id="videoUploadIcon">📁</div>
                    <div class="upload-text" id="videoUploadText">点击或拖拽多个视频到此处<br>支持批量选择和批量转换<br>支持MP4、WebM、OGG等格式</div>
                    <div class="file-list" id="videoFileList"></div>
                </div>
                
                <div class="progress-container" id="videoProgressContainer">
                    <div class="progress-bar" id="videoProgressBar"></div>
                </div>
                
                <div class="format-section">
                    <div class="format-group">
                        <label class="format-label">目标格式</label>
                        <select id="videoTargetFormat" class="format-select">
                            <option value="mp4">MP4</option>
                            <option value="webm">WebM</option>
                            <option value="ogg">OGG</option>
                        </select>
                    </div>
                </div>
                
                <div class="button-area">
                    <button class="button" id="videoConvertButton" disabled>转换</button>
                    <button class="button" id="videoDownloadButton" disabled>下载</button>
                    <button class="button" id="videoResetButton">清空</button>
                </div>
                
                <div class="status" id="videoStatus">就绪</div>
            </div>
        </div>

        <!-- 音频转换器窗口 -->
        <div class="window" id="audioConverterWindow">
            <div class="window-titlebar">
                <div class="window-title">音频格式转换器 - 批量版</div>
                <div class="window-controls">
                    <div class="control-button" id="audioMinimizeButton">_</div>
                    <div class="control-button" id="audioMaximizeButton">□</div>
                    <div class="control-button" id="audioCloseButton">×</div>
                </div>
            </div>
            <div class="window-content">
                <div class="title">选择多个音频进行批量格式转换</div>
                
                <div class="upload-file-area" id="audioUploadArea">
                    <input type="file" id="audioFileInput" accept="audio/*" style="display: none;" multiple>
                    <div class="upload-icon" id="audioUploadIcon">📁</div>
                    <div class="upload-text" id="audioUploadText">点击或拖拽多个音频到此处<br>支持批量选择和批量转换<br>支持MP3、WAV、OGG、AAC等格式</div>
                    <div class="file-list" id="audioFileList"></div>
                </div>
                
                <div class="progress-container" id="audioProgressContainer">
                    <div class="progress-bar" id="audioProgressBar"></div>
                </div>
                
                <div class="format-section">
                    <div class="format-group">
                        <label class="format-label">目标格式</label>
                        <select id="audioTargetFormat" class="format-select">
                            <option value="mp3">MP3</option>
                            <option value="wav">WAV</option>
                            <option value="ogg">OGG</option>
                            <option value="aac">AAC</option>
                        </select>
                    </div>
                </div>
                
                <div class="button-area">
                    <button class="button" id="audioConvertButton" disabled>转换</button>
                    <button class="button" id="audioDownloadButton" disabled>下载</button>
                    <button class="button" id="audioResetButton">清空</button>
                </div>
                
                <div class="status" id="audioStatus">就绪</div>
            </div>
        </div>
    </div>

    <script>
        // 绘制桌面背景：狐狸在电脑前办公
        function drawDesktopBackground() {
            const canvas = document.getElementById('desktopCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置Canvas尺寸
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // 纯色背景
            ctx.fillStyle = '#008080';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 计算中心位置
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 绘制狐狸
            drawFox(ctx, centerX, centerY);
            
            // 绘制电脑
            drawComputer(ctx, centerX, centerY + 60);
        }
        
        // 绘制狐狸
        function drawFox(ctx, x, y) {
            // 身体
            ctx.fillStyle = '#FF8C42';
            ctx.beginPath();
            ctx.ellipse(x, y + 20, 30, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 头部
            ctx.beginPath();
            ctx.ellipse(x, y - 10, 25, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 耳朵
            ctx.beginPath();
            ctx.moveTo(x - 15, y - 25);
            ctx.lineTo(x - 25, y - 40);
            ctx.lineTo(x - 5, y - 30);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x + 15, y - 25);
            ctx.lineTo(x + 25, y - 40);
            ctx.lineTo(x + 5, y - 30);
            ctx.fill();
            
            // 耳朵内耳
            ctx.fillStyle = '#FFB380';
            ctx.beginPath();
            ctx.moveTo(x - 15, y - 25);
            ctx.lineTo(x - 20, y - 35);
            ctx.lineTo(x - 10, y - 30);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x + 15, y - 25);
            ctx.lineTo(x + 20, y - 35);
            ctx.lineTo(x + 10, y - 30);
            ctx.fill();
            
            // 眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(x - 8, y - 10, 4, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(x + 8, y - 10, 4, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 眼珠
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(x - 8, y - 10, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x + 8, y - 10, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 鼻子
            ctx.beginPath();
            ctx.arc(x, y - 5, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // 嘴巴
            ctx.beginPath();
            ctx.moveTo(x, y - 2);
            ctx.lineTo(x - 5, y + 2);
            ctx.lineTo(x + 5, y + 2);
            ctx.closePath();
            ctx.fill();
            
            // 手臂
            ctx.fillStyle = '#FF8C42';
            ctx.beginPath();
            ctx.moveTo(x - 30, y + 15);
            ctx.lineTo(x - 45, y + 10);
            ctx.lineTo(x - 40, y + 20);
            ctx.lineTo(x - 25, y + 25);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x + 30, y + 15);
            ctx.lineTo(x + 45, y + 10);
            ctx.lineTo(x + 40, y + 20);
            ctx.lineTo(x + 25, y + 25);
            ctx.fill();
            
            // 尾巴
            ctx.beginPath();
            ctx.moveTo(x + 30, y + 20);
            ctx.quadraticCurveTo(x + 50, y + 10, x + 40, y + 30);
            ctx.quadraticCurveTo(x + 50, y + 40, x + 30, y + 30);
            ctx.closePath();
            ctx.fill();
        }
        
        // 绘制电脑
        function drawComputer(ctx, x, y) {
            // 显示器
            ctx.fillStyle = '#333333';
            ctx.fillRect(x - 60, y - 40, 120, 80);
            
            // 屏幕
            ctx.fillStyle = '#E0E0E0';
            ctx.fillRect(x - 55, y - 35, 110, 70);
            
            // 电脑桌
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 80, y + 40, 160, 10);
            
            // 桌腿
            ctx.fillRect(x - 75, y + 50, 10, 20);
            ctx.fillRect(x + 65, y + 50, 10, 20);
            
            // 键盘
            ctx.fillStyle = '#CCCCCC';
            ctx.fillRect(x - 40, y + 10, 80, 20);
            
            // 键盘按键
            ctx.fillStyle = '#FFFFFF';
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 3; j++) {
                    ctx.fillRect(x - 35 + i * 10, y + 12 + j * 6, 8, 4);
                }
            }
        }

        // 图片转换器相关变量
        let imageSelectedFiles = [];
        let imageConvertedFiles = [];
        let imageIsConverting = false;

        // 视频转换器相关变量
        let videoSelectedFiles = [];
        let videoConvertedFiles = [];
        let videoIsConverting = false;

        // 音频转换器相关变量
        let audioSelectedFiles = [];
        let audioConvertedFiles = [];
        let audioIsConverting = false;

        // DOM 元素
        const imageConverterIcon = document.getElementById('imageConverterIcon');
        const imageConverterWindow = document.getElementById('imageConverterWindow');
        const imageCloseButton = document.getElementById('imageCloseButton');
        const imageMinimizeButton = document.getElementById('imageMinimizeButton');
        const imageUploadArea = document.getElementById('imageUploadArea');
        const imageUploadIcon = document.getElementById('imageUploadIcon');
        const imageUploadText = document.getElementById('imageUploadText');
        const imageFileInput = document.getElementById('imageFileInput');
        const imageFileList = document.getElementById('imageFileList');
        const imageTargetFormat = document.getElementById('imageTargetFormat');
        const imageConvertButton = document.getElementById('imageConvertButton');
        const imageDownloadButton = document.getElementById('imageDownloadButton');
        const imageResetButton = document.getElementById('imageResetButton');
        const imageStatus = document.getElementById('imageStatus');
        const imageProgressContainer = document.getElementById('imageProgressContainer');
        const imageProgressBar = document.getElementById('imageProgressBar');

        const videoConverterIcon = document.getElementById('videoConverterIcon');
        const videoConverterWindow = document.getElementById('videoConverterWindow');
        const videoCloseButton = document.getElementById('videoCloseButton');
        const videoMinimizeButton = document.getElementById('videoMinimizeButton');
        const videoUploadArea = document.getElementById('videoUploadArea');
        const videoUploadIcon = document.getElementById('videoUploadIcon');
        const videoUploadText = document.getElementById('videoUploadText');
        const videoFileInput = document.getElementById('videoFileInput');
        const videoFileList = document.getElementById('videoFileList');
        const videoTargetFormat = document.getElementById('videoTargetFormat');
        const videoConvertButton = document.getElementById('videoConvertButton');
        const videoDownloadButton = document.getElementById('videoDownloadButton');
        const videoResetButton = document.getElementById('videoResetButton');
        const videoStatus = document.getElementById('videoStatus');
        const videoProgressContainer = document.getElementById('videoProgressContainer');
        const videoProgressBar = document.getElementById('videoProgressBar');

        const audioConverterIcon = document.getElementById('audioConverterIcon');
        const audioConverterWindow = document.getElementById('audioConverterWindow');
        const audioCloseButton = document.getElementById('audioCloseButton');
        const audioMinimizeButton = document.getElementById('audioMinimizeButton');
        const audioUploadArea = document.getElementById('audioUploadArea');
        const audioUploadIcon = document.getElementById('audioUploadIcon');
        const audioUploadText = document.getElementById('audioUploadText');
        const audioFileInput = document.getElementById('audioFileInput');
        const audioFileList = document.getElementById('audioFileList');
        const audioTargetFormat = document.getElementById('audioTargetFormat');
        const audioConvertButton = document.getElementById('audioConvertButton');
        const audioDownloadButton = document.getElementById('audioDownloadButton');
        const audioResetButton = document.getElementById('audioResetButton');
        const audioStatus = document.getElementById('audioStatus');
        const audioProgressContainer = document.getElementById('audioProgressContainer');
        const audioProgressBar = document.getElementById('audioProgressBar');

        // 窗口控制
        function initWindowControls() {
            // 图片转换器窗口控制
            imageConverterIcon.addEventListener('click', () => {
                imageConverterWindow.classList.add('active');
            });

            imageCloseButton.addEventListener('click', () => {
                if (!imageIsConverting) {
                    imageConverterWindow.classList.remove('active');
                }
            });

            imageMinimizeButton.addEventListener('click', () => {
                if (!imageIsConverting) {
                    imageConverterWindow.classList.remove('active');
                }
            });

            // 视频转换器窗口控制
            videoConverterIcon.addEventListener('click', () => {
                videoConverterWindow.classList.add('active');
            });

            videoCloseButton.addEventListener('click', () => {
                if (!videoIsConverting) {
                    videoConverterWindow.classList.remove('active');
                }
            });

            videoMinimizeButton.addEventListener('click', () => {
                if (!videoIsConverting) {
                    videoConverterWindow.classList.remove('active');
                }
            });

            // 音频转换器窗口控制
            audioConverterIcon.addEventListener('click', () => {
                audioConverterWindow.classList.add('active');
            });

            audioCloseButton.addEventListener('click', () => {
                if (!audioIsConverting) {
                    audioConverterWindow.classList.remove('active');
                }
            });

            audioMinimizeButton.addEventListener('click', () => {
                if (!audioIsConverting) {
                    audioConverterWindow.classList.remove('active');
                }
            });
        }

        // 初始化事件监听
        function initEventListeners() {
            // 图片上传事件
            imageUploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (!imageIsConverting) {
                    imageUploadArea.style.borderColor = '#000080';
                }

                if (fileName.endsWith('.heic')) {
                    const convertedBlob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.3 });
                    previewSrc = URL.createObjectURL(convertedBlob);
                } else {
                    const reader = new FileReader();
                    previewSrc = await new Promise((resolve, reject) => {
                        reader.onload = (e) => resolve(e.target.result);

        // 批量转换图片
        async function convertAllImages() {
            if (imageSelectedFiles.length === 0) {
                showImageStatus('请先选择图片', 'error');
                return;
            }

            imageIsConverting = true;
            imageConvertedFiles = [];
            imageProgressContainer.style.display = 'block';
            imageConvertButton.disabled = true;
            imageDownloadButton.disabled = true;
            imageResetButton.disabled = true;

            const targetExt = imageTargetFormat.value;
            let successCount = 0;
            let failCount = 0;

            // 先更新一次文件列表，显示所有文件为转换中状态
            imageSelectedFiles.forEach(item => {
                item.status = 'converting';
            });
            updateImageFileList();

            for (let i = 0; i < imageSelectedFiles.length; i++) {
                const item = imageSelectedFiles[i];
                
                showImageStatus(`正在转换 ${i + 1}/${imageSelectedFiles.length}...`, 'info');
                imageProgressBar.style.width = `${(i / imageSelectedFiles.length) * 100}%`;

                try {
                    const blob = await convertSingleImage(item.file, targetExt, item.id);
                    item.convertedBlob = blob;
                    item.status = 'success';
                    imageConvertedFiles.push(item);
                    successCount++;
                } catch (error) {
                    item.status = 'error';
                    failCount++;
                }
                
                // 只更新当前文件的状态，而不是整个列表
                updateSingleImageFileStatus(item);
            }

            imageProgressBar.style.width = '100%';
            
            if (failCount === 0) {
                showImageStatus(`全部 ${successCount} 张图片转换完成`, 'success');
            } else {
                showImageStatus(`完成 ${successCount} 张，失败 ${failCount} 张`, 'info');
            }

            imageIsConverting = false;
            imageDownloadButton.disabled = imageConvertedFiles.length === 0;
            imageResetButton.disabled = false;
        }

        // 批量转换音频

        // 转换单张图片
        async function convertSingleImage(file, targetExt, itemId) {
            try {
                const fileName = file.name.toLowerCase();
                const progressBar = document.getElementById('image-progressbar-' + itemId);
                const progressContainer = document.getElementById('image-progress-' + itemId);
                
                // 显示进度条
                if (progressContainer) {
                    progressContainer.style.display = 'block';
                }
                
                // 更新进度到25%
                if (progressBar) {
                    progressBar.style.width = '25%';
                }
                
                // 如果目标格式是HEIC
                if (targetExt === 'heic') {
                    // 先将图片转换为PNG，再转换为HEIC
                    const pngBlob = await new Promise((resolve, reject) => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const img = new Image();

                        img.onload = () => {
                            // 更新进度到50%
                            if (progressBar) {
                                progressBar.style.width = '50%';
                            }
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            canvas.toBlob((blob) => {
                                if (blob) {
                                    resolve(blob);
                                } else {
                                    reject(new Error('转换失败'));
                                }
                            }, 'image/png');
                        };

                        img.onerror = () => reject(new Error('图片加载失败'));
                        img.src = URL.createObjectURL(file);
                    });
                    
                    // 更新进度到75%
                    if (progressBar) {
                        progressBar.style.width = '75%';
                    }
                    
                    // 使用heic2any转换为HEIC
                    try {
                        const heicBlob = await heic2any({
                            blob: pngBlob,
                            toType: 'image/heic'
                        });
                        // 更新进度到100%
                        if (progressBar) {
                            progressBar.style.width = '100%';
                        }
                        return heicBlob;
                    } catch (error) {
                        console.error('HEIC转换失败:', error);
                        throw new Error('HEIC转换失败');
                    }
                } 
                // 如果目标格式不是HEIC
                else {
                    let imageBlob = file;
                    
                    // 如果是HEIC文件，先转换
                    if (fileName.endsWith('.heic')) {
                        imageBlob = await heic2any({ blob: file, toType: 'image/png' });
                        // 更新进度到50%
                        if (progressBar) {
                            progressBar.style.width = '50%';
                        }
                    }
                    
                    return new Promise((resolve, reject) => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const img = new Image();

                        img.onload = () => {
                            // 更新进度到75%
                            if (progressBar) {
                                progressBar.style.width = '75%';
                            }
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);

                            canvas.toBlob((blob) => {
                                if (blob) {
                                    // 更新进度到100%
                                    if (progressBar) {
                                        progressBar.style.width = '100%';
                                    }
                                    resolve(blob);
                                } else {
                                    reject(new Error('转换失败'));
                                }
                            }, `image/${targetExt}`, 0.9);
                        };

                        img.onerror = () => reject(new Error('图片加载失败'));
                        img.src = URL.createObjectURL(imageBlob);
                    });
                }
            } catch (error) {
                throw error;
            }
        }

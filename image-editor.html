<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片编辑器 - Windows XP风格</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop">
        <!-- 桌面背景Canvas -->
        <canvas id="desktopCanvas"></canvas>
        
        <!-- 桌面图标 -->
        <div class="desktop-icon" id="imageEditorIcon" style="top: 20px; left: 20px;">
            <div class="icon-image">🖼️</div>
            <div class="icon-label">图片编辑器</div>
        </div>

        <!-- 图片编辑窗口 -->
        <div class="window active" id="imageEditorWindow">
            <div class="window-titlebar">
                <div class="window-title">图片编辑器</div>
                <div class="window-controls">
                    <div class="control-button" id="imageEditorMinButton">_</div>
                    <div class="control-button" id="imageEditorMaxButton">□</div>
                    <div class="control-button" id="imageEditorCloseButton">×</div>
                </div>
            </div>
            <div class="window-content">
                <div class="title">选择图片进行编辑</div>
                
                <div class="upload-file-area" id="imageUploadArea">
                    <input type="file" id="imageFileInput" accept="image/*,.heic" style="display: none;" multiple>
                    <div class="upload-icon" id="imageUploadIcon">📁</div>
                    <div class="upload-text" id="imageUploadText">点击或拖拽图片到此处<br>支持JPG、PNG、WebP、GIF、HEIC格式</div>
                    <div class="file-list" id="imageFileList"></div>
                </div>
                
                <div class="button-area">
                    <button class="button" id="imageEditButton" disabled>编辑图片</button>
                    <button class="button" id="imageDownloadButton" disabled>下载</button>
                    <button class="button" id="imageResetButton">清空</button>
                </div>
                
                <div class="status" id="imageStatus">就绪</div>
            </div>
        </div>
        
        <!-- 图片编辑窗口 -->
        <div class="window" id="editorWindow">
            <div class="window-titlebar">
                <div class="window-title">图片编辑器 - 编辑模式</div>
                <div class="window-controls">
                    <div class="control-button" id="editorMinButton">_</div>
                    <div class="control-button" id="editorMaxButton">□</div>
                    <div class="control-button" id="editorCloseButton">×</div>
                </div>
            </div>
            <div class="window-content">
                <div class="editor-layout">
                    <div class="editor-preview">
                        <canvas id="editorCanvas" class="editor-canvas"></canvas>
                        <div class="crop-overlay" id="cropOverlay" style="display: none;">
                            <div class="crop-box" id="cropBox"></div>
                        </div>
                    </div>
                    <div class="editor-controls">
                        <div class="control-tabs">
                            <div class="tab active" data-tab="crop">裁剪</div>
                            <div class="tab" data-tab="adjust">调整</div>
                        </div>
                        
                        <!-- 裁剪面板 -->
                        <div class="tab-content active" id="cropPanel">
                            <div class="control-group">
                                <label class="control-label">裁剪比例</label>
                                <select id="cropRatio" class="format-select">
                                    <option value="free">自由裁剪</option>
                                    <option value="1:1">1:1 (正方形)</option>
                                    <option value="4:3">4:3</option>
                                    <option value="16:9">16:9</option>
                                    <option value="3:2">3:2</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <label class="control-label">预设模板</label>
                                <select id="cropPreset" class="format-select">
                                    <option value="none">选择模板</option>
                                    <option value="a4-portrait">A4 竖版 (210x297mm)</option>
                                    <option value="a4-landscape">A4 横版 (297x210mm)</option>
                                    <option value="a3-portrait">A3 竖版 (297x420mm)</option>
                                    <option value="a3-landscape">A3 横版 (420x297mm)</option>
                                    <option value="id-1inch">一寸照 (25x35mm)</option>
                                    <option value="id-2inch">二寸照 (35x49mm)</option>
                                    <option value="instagram">Instagram (1080x1080)</option>
                                    <option value="cover-facebook">Facebook 封面 (820x312)</option>
                                    <option value="cover-twitter">Twitter 封面 (1500x500)</option>
                                </select>
                            </div>
                            <div class="button-area">
                                <button class="button" id="applyCrop">应用裁剪</button>
                                <button class="button" id="resetCrop">重置裁剪</button>
                            </div>
                        </div>
                        
                        <!-- 调整面板 -->
                        <div class="tab-content" id="adjustPanel">
                            <div class="control-group">
                                <label class="control-label">亮度: <span id="brightnessValue">0</span></label>
                                <input type="range" id="brightness" class="slider" min="-100" max="100" value="0">
                            </div>
                            <div class="control-group">
                                <label class="control-label">对比度: <span id="contrastValue">0</span></label>
                                <input type="range" id="contrast" class="slider" min="-100" max="100" value="0">
                            </div>
                            <div class="control-group">
                                <label class="control-label">饱和度: <span id="saturationValue">0</span></label>
                                <input type="range" id="saturation" class="slider" min="-100" max="100" value="0">
                            </div>
                            <div class="control-group">
                                <div class="effect-buttons">
                                    <button class="button" id="grayscaleEffect">黑白</button>
                                    <button class="button" id="invertEffect">反向</button>
                                    <button class="button" id="sepiaEffect">复古</button>
                                </div>
                            </div>
                            <div class="control-group">
                                <div class="effect-buttons">
                                    <button class="button" id="rotateLeft">左旋转90°</button>
                                    <button class="button" id="rotateRight">右旋转90°</button>
                                    <button class="button" id="flipHorizontal">水平翻转</button>
                                    <button class="button" id="flipVertical">垂直翻转</button>
                                </div>
                            </div>
                            <div class="button-area">
                                <button class="button" id="applyAdjust">应用调整</button>
                                <button class="button" id="resetAdjust">重置调整</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="editor-footer">
                    <button class="button" id="saveEditor">保存编辑</button>
                    <button class="button" id="cancelEditor">取消</button>
                </div>
            </div>
        </div>
        
    </div>
    
    <!-- Windows XP 任务栏 -->
    <div class="taskbar">
        <div class="start-button" id="startButton">
            <span class="start-icon">🪟</span>
            <span class="start-text">开始</span>
        </div>
        <div class="taskbar-separator"></div>
        <div class="taskbar-items" id="taskbarItems"></div>
        <div class="system-tray">
            <div class="clock" id="clock">12:00</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="script-editor.js"></script>
</body>
</html>
